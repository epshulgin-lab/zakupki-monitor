name: Парсер закупок ИТС

on:
  schedule:
    # Каждый будний день в 9:00 по Москве (06:00 UTC)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:  # Ручной запуск из GitHub

permissions:
  contents: write  # Нужно для коммита data.json

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install requests beautifulsoup4 lxml

      - name: Запуск парсера
        run: python parse.py

      - name: Сохранение data.json в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🚦 Обновление закупок $(date +'%d.%m.%Y %H:%M')"
          git push
